    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        

        
        body{
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            background: radial-gradient(circle at top, #2a2a2a, #0d0d0d);
            color: white;
            
        }
        
        .box{
            align-items: center;
            padding: 30px;
            text-align: center;
            border-radius: 20px;
            margin: auto;
        }

        .icone{
            border-radius: 25px;

        }


        .inner{
            display: block;
            margin: 12px 0;
            padding: 15px;
            border-radius: 15px;

            background-color: rgba(255, 255, 255, 0.05);

            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 500;
            transition: 0.3s;
            
        }
        
        .container{
            margin: auto;
            width: 400px;
            text-align: center;
            animation: aparecer 0.8s ease-out;
            transition: transform 0.2s ease, box-shadow 0.4s ease;

        }

        .inner:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        a{
            text-decoration: none;
            color: white;
        }

        .title {
            margin-bottom: 30px;
            align-items: center;
        }

        .title h1 {
            font-size: 22px;
            font-weight: 500;
        }

        .icone {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 10px;
            border: 2px solid white;
        }

         .icone:hover{
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        
        h3{
            font-size: 18px;
            font-weight: 500;
            margin-top: 25px;
        }
        
        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 500px) {
            .container {
                padding: 20px;
            }
        }

    </style>
</head>
